<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UX Flow — Творцы будущего</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e8eaf0; overflow: hidden; }
#app { width: 100vw; height: 100vh; display: flex; flex-direction: column; }

.header { display: flex; align-items: center; gap: 18px; padding: 0 18px; border-bottom: 1px solid #1e2130; height: 44px; flex-shrink: 0; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; opacity: .78; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sep { width: 1px; height: 16px; background: #1e2130; }
.hint { margin-left: auto; opacity: .28; font-size: 11px; }

#wrap { flex: 1; position: relative; overflow: hidden; cursor: grab; }
#wrap.drag { cursor: grabbing; }
#cvs { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

.ctrl { position: absolute; bottom: 14px; right: 14px; display: flex; flex-direction: column; gap: 5px; z-index: 10; }
.cb { width: 33px; height: 33px; border-radius: 7px; border: 1px solid #1e2130; background: #161820; color: #e8eaf0; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; }
.cb:hover { background: #22253a; }
.rb { position: absolute; bottom: 14px; left: 14px; font-size: 11.5px; padding: 6px 13px; border-radius: 7px; border: 1px solid #1e2130; background: #161820; color: #e8eaf0; cursor: pointer; }
.rb:hover { background: #22253a; }

#tt { position: fixed; background: #0b0d14; border: 1px solid #1e2130; border-radius: 10px; padding: 11px 15px; font-size: 12px; line-height: 1.6; max-width: 272px; pointer-events: none; z-index: 9999; display: none; box-shadow: 0 12px 40px rgba(0,0,0,.75); }
#tt .t  { font-weight: 600; font-size: 13.5px; margin-bottom: 2px; }
#tt .r  { font-family: monospace; font-size: 11px; opacity: .42; margin-bottom: 7px; }
#tt .d  { opacity: .8; font-size: 12px; white-space: pre-line; }
#tt .n  { margin-top: 8px; border-top: 1px solid #1e2130; padding-top: 7px; font-size: 11px; opacity: .55; }
#tt .i  { margin-top: 8px; border-top: 1px solid #1e2130; padding-top: 7px; font-size: 11px; color: #f08c00; }

.node { cursor: pointer; }
.node:hover .nb { filter: brightness(1.22); }
.node text { pointer-events: none; }
</style>
</head>

<div id="app">

    <div class="legend-item"><div class="legend-dot" style="background:#3b5bdb"></div>Авторизация</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e8590c"></div>Блокирующий</div>

    <div class="sep"></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f08c00"></div>Открытый вопрос</div>
    <div class="sep"></div>

</div>

// ─── BUILD SVG ───────────────────────────────────────────────────────────────
function buildSVG() {
  const svg = document.getElementById('cvs');
  const PAD = 70;
  const allX = NODES.map(n=>n.x), allY = NODES.map(n=>n.y);
  const minX = Math.min(...allX)-PAD, minY = Math.min(...allY)-PAD;
  const maxX = Math.max(...allX)+W+PAD, maxY = Math.max(...allY)+H+PAD;
  svg.setAttribute('width',  maxX-minX);
  svg.setAttribute('height', maxY-minY);
  svg.setAttribute('viewBox',`${minX} ${minY} ${maxX-minX} ${maxY-minY}`);

  svg.innerHTML = `<defs>
    <marker id="a1" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/></marker>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#333"/></marker>
    <marker id="a-cap" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#6741d9"/></marker>
    <marker id="a-mem" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#0c8599"/></marker>
  </defs>`;

  // Zones
  ZONES.forEach(z => {
    if (z.thin) {
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',z.x); line.setAttribute('y1',z.y+z.h/2);
      line.setAttribute('x2',z.x+z.w); line.setAttribute('y2',z.y+z.h/2);
      line.setAttribute('stroke',z.color); line.setAttribute('stroke-opacity','0.2');
      line.setAttribute('stroke-width','1');
      svg.appendChild(line);
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',z.x+z.w/2); t.setAttribute('y',z.y+z.h/2-4);
      t.setAttribute('text-anchor','middle');
      t.setAttribute('fill',z.color); t.setAttribute('fill-opacity','0.3');
      t.setAttribute('font-size','9.5'); t.setAttribute('font-weight','700');
      t.setAttribute('letter-spacing','0.12em');
      t.textContent = z.label;
      svg.appendChild(t);
      return;
    }
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',z.x); r.setAttribute('y',z.y);
    r.setAttribute('width',z.w); r.setAttribute('height',z.h);
    r.setAttribute('rx',16);
    r.setAttribute('fill',z.color); r.setAttribute('fill-opacity','0.055');
    r.setAttribute('stroke',z.color); r.setAttribute('stroke-opacity','0.18');
    r.setAttribute('stroke-width','1.5');
    svg.appendChild(r);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',z.x+14); t.setAttribute('y',z.y+20);
    t.setAttribute('fill',z.color); t.setAttribute('fill-opacity','0.5');
    t.setAttribute('font-size','10'); t.setAttribute('font-weight','700');
    t.setAttribute('letter-spacing','0.09em');
    t.textContent = z.label;
    svg.appendChild(t);
  });

  // Cross connections (drawn before regular edges so they appear under)
  CROSS.forEach(c => {
    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d', c.path); el.setAttribute('fill','none');
    el.setAttribute('stroke', c.color); el.setAttribute('stroke-opacity','0.5');
    el.setAttribute('stroke-width','1.8');
    el.setAttribute('stroke-dasharray', c.dash ? '7,5' : '4,3');
    const mid = c.color === '#6741d9' ? 'url(#a-cap)' : 'url(#a-mem)';
    el.setAttribute('marker-end', mid);
    svg.appendChild(el);

    // label at midpoint (rough)
    if (c.label) {
      const tl = document.createElementNS('http://www.w3.org/2000/svg','text');
      // put label slightly off the path midpoint
      const lx = c.color === '#6741d9' ? 670+75+30 : 1150;
      const ly = c.color === '#6741d9' ? 700+14     : 1060;
      tl.setAttribute('x', lx); tl.setAttribute('y', ly);
      tl.setAttribute('fill', c.color); tl.setAttribute('fill-opacity','0.6');
      tl.setAttribute('font-size','10'); tl.setAttribute('text-anchor','middle');
      tl.textContent = c.label;
      svg.appendChild(tl);
    }
  });

  // Regular edges
  const revExists = e => EDGES.some(e2=>e2.from===e.to && e2.to===e.from);
  const isFirst   = e => {
    const rev = EDGES.find(e2=>e2.from===e.to && e2.to===e.from);
    return !rev || EDGES.indexOf(e) < EDGES.indexOf(rev);
  };

  EDGES.forEach(e => {
    const na = NODES.find(n=>n.id===e.from);
    const nb = NODES.find(n=>n.id===e.to);
    if (!na||!nb) return;
    const ax=na.x+W/2, ay=na.y+H/2, bx=nb.x+W/2, by=nb.y+H/2;
    const dx=bx-ax, dy=by-ay;
    const horiz = Math.abs(dx) >= Math.abs(dy);
    const bidi = revExists(e), bd = bidi?(isFirst(e)?1:-1):0, ba = bidi?36:0;

    let sx,sy,tx,ty;
    if (horiz) { sx=dx>0?na.x+W:na.x; sy=ay; tx=dx>0?nb.x:nb.x+W; ty=by; }
    else        { sx=ax; sy=dy>0?na.y+H:na.y; tx=bx; ty=dy>0?nb.y:nb.y+H; }

    let path,lx,ly;
    if (horiz) {
      const mx=(sx+tx)/2, off=bd*ba;
      path=`M${sx},${sy} C${mx},${sy+off} ${mx},${ty+off} ${tx},${ty}`;
      lx=mx; ly=(sy+ty)/2+off-8;
    } else {
      const my=(sy+ty)/2, off=bd*ba;
      path=`M${sx},${sy} C${sx+off},${my} ${tx+off},${my} ${tx},${ty}`;
      lx=(sx+tx)/2+(off?off+10:8); ly=my;
    }

    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d',path); el.setAttribute('fill','none');
    el.setAttribute('stroke', e.dash?'#2c2c3e':'#454545');
    el.setAttribute('stroke-width', e.small?'1.2':'1.8');
    el.setAttribute('stroke-dasharray', e.dash?'6,4':'none');
    el.setAttribute('marker-end', e.dash?'url(#a2)':'url(#a1)');
    svg.appendChild(el);

    if (e.label && !e.small) {
      const tl = document.createElementNS('http://www.w3.org/2000/svg','text');
      tl.setAttribute('x',lx); tl.setAttribute('y',ly);
      tl.setAttribute('fill','#585858'); tl.setAttribute('font-size','10');
      tl.setAttribute('text-anchor','middle');
      tl.textContent = e.label;
      svg.appendChild(tl);
    }
  });

  // Nodes
  NODES.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('class','nb');
    rect.setAttribute('width',W); rect.setAttribute('height',H); rect.setAttribute('rx',9);
    rect.setAttribute('fill',n.color); rect.setAttribute('fill-opacity','0.17');
    rect.setAttribute('stroke',n.color); rect.setAttribute('stroke-opacity','0.75');
    rect.setAttribute('stroke-width','1.8');
    g.appendChild(rect);

    if (n.issue) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',W-9); dot.setAttribute('cy',9);
      dot.setAttribute('r',5); dot.setAttribute('fill','#f08c00');
      g.appendChild(dot);
    }

    const bar = document.createElementNS('http://www.w3.org/2000/svg','rect');
    bar.setAttribute('width',3); bar.setAttribute('height',H-18);
    bar.setAttribute('x',0); bar.setAttribute('y',9);
    bar.setAttribute('rx',2); bar.setAttribute('fill',n.color);
    g.appendChild(bar);

    const lines = n.label.split('\n');
    const lh=14, sy0=H/2-((lines.length-1)*lh/2)+(n.sub?-6:0);
    lines.forEach((line,i)=>{
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',W/2+2); t.setAttribute('y',sy0+i*lh);
      t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','middle');
      t.setAttribute('fill','#e8eaf0'); t.setAttribute('font-size','13');
      t.setAttribute('font-weight','600'); t.textContent=line;
      g.appendChild(t);
    });

    if (n.sub) {
      const ts=document.createElementNS('http://www.w3.org/2000/svg','text');
      ts.setAttribute('x',W/2+2); ts.setAttribute('y',H/2+15);
      ts.setAttribute('text-anchor','middle'); ts.setAttribute('dominant-baseline','middle');
      ts.setAttribute('fill',n.color); ts.setAttribute('fill-opacity','0.8');
      ts.setAttribute('font-size','9.5'); ts.textContent=n.sub;
      g.appendChild(ts);
    }

    svg.appendChild(g);
    g.addEventListener('mouseenter', evt=>showTT(n,evt));
    g.addEventListener('mousemove',  moveTT);
    g.addEventListener('mouseleave', ()=>{ document.getElementById('tt').style.display='none'; });
  });
}

function showTT(n,evt){
  document.getElementById('tt-t').textContent = n.label.replace('\n',' ');
  document.getElementById('tt-r').textContent = n.route||'';
  document.getElementById('tt-d').textContent = n.desc;
  const nel=document.getElementById('tt-n');
  nel.textContent=n.nav?'→ '+n.nav:''; nel.style.display=n.nav?'block':'none';
  const iel=document.getElementById('tt-i');
  iel.textContent=n.issue?'⚠ '+n.issue:''; iel.style.display=n.issue?'block':'none';
  document.getElementById('tt').style.display='block';
  moveTT(evt);
}
function moveTT(evt){
  const tt=document.getElementById('tt');
  let x=evt.clientX+16, y=evt.clientY-12;
  if(x+282>window.innerWidth)  x=evt.clientX-288;
  if(y+270>window.innerHeight) y=evt.clientY-275;
  tt.style.left=x+'px'; tt.style.top=y+'px';
}

// ─── PAN / ZOOM ───────────────────────────────────────────────────────────────
let sc=1,ox=0,oy=0,dr=false,sx0,sy0,sox,soy;
const wrap=document.getElementById('wrap'), cvs=document.getElementById('cvs');
const applyT=()=>cvs.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;

function fit(){
  const svgW=parseFloat(cvs.getAttribute('width')||1300);
  const svgH=parseFloat(cvs.getAttribute('height')||1900);
  const wW=wrap.offsetWidth, wH=wrap.offsetHeight;
  sc=Math.min(wW/svgW, wH/svgH)*0.92;
  ox=(wW-svgW*sc)/2; oy=(wH-svgH*sc)/2; applyT();
}

wrap.addEventListener('mousedown',e=>{
  dr=true; sx0=e.clientX; sy0=e.clientY; sox=ox; soy=oy;
  wrap.classList.add('drag');
});
window.addEventListener('mousemove',e=>{ if(!dr)return; ox=sox+(e.clientX-sx0); oy=soy+(e.clientY-sy0); applyT(); });
window.addEventListener('mouseup',()=>{ dr=false; wrap.classList.remove('drag'); });
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const d=e.deltaY>0?.88:1.14, ns=Math.max(.18,Math.min(4,sc*d));
  ox=mx-(mx-ox)*(ns/sc); oy=my-(my-oy)*(ns/sc); sc=ns; applyT();
},{passive:false});
document.getElementById('zi').onclick=()=>{ sc=Math.min(4,sc*1.2); applyT(); };
document.getElementById('zo').onclick=()=>{ sc=Math.max(.18,sc/1.2); applyT(); };
document.getElementById('rv').onclick=fit;

buildSVG();
setTimeout(fit, 30);
</script>
</body>
</html>
